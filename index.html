<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#064e3b">
  <title>Carteira Arthur</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
  <link rel="icon" href="assets/favicon.ico">
  <link rel="stylesheet" href="css/app.css">
  <script src="js/crypto.js?v=5"></script>
  <script src="js/format.js?v=5"></script>
  <script src="js/app.js?v=5"></script>
  <script defer src="js/vendor/alpine.min.js"></script>
</head>
<body x-data="app" x-cloak>
  <main>
    <template x-if="fase === 'pin'">
      <section class="pin-screen">
        <h1>Carteira</h1>
        <p class="subtitle">Digite o PIN para visualizar</p>
        <form @submit.prevent="submitPin">
          <input
            type="tel"
            inputmode="numeric"
            pattern="\d{6}"
            maxlength="6"
            autocomplete="off"
            x-model="pin"
            :disabled="carregando"
            placeholder="••••••"
            class="pin-input"
            aria-label="PIN de 6 dígitos"
            autofocus>
          <button type="submit" :disabled="carregando || pin.length !== 6" class="pin-submit">
            <span x-show="!carregando">Entrar</span>
            <span x-show="carregando">Decifrando…</span>
          </button>
          <p class="pin-error" x-show="pinError" x-text="pinError"></p>
        </form>
      </section>
    </template>

    <template x-if="fase === 'raiox'">
      <section class="raiox">
        <h1>Raio X</h1>

        <section class="hero" aria-label="Patrimônio total">
          <p class="hero-label">Patrimônio total</p>
          <p class="hero-updated" x-text="formatDataHora(json.atualizado_em)"></p>
          <p class="hero-valor" x-text="formatBrl(json.patrimonio.total_brl)"></p>
          <div
            class="hero-delta"
            :class="json.patrimonio.variacao_semanal_brl >= 0 ? 'is-positive' : 'is-negative'"
            x-show="json.patrimonio.variacao_semanal_brl !== null && json.patrimonio.variacao_semanal_brl !== undefined">
            <span class="seta" x-text="json.patrimonio.variacao_semanal_brl >= 0 ? '▲' : '▼'"></span>
            <span x-text="formatBrl(json.patrimonio.variacao_semanal_brl)"></span>
            <span x-text="'(' + formatPct(json.patrimonio.variacao_semanal_pct) + ')'"></span>
            <span class="texto">· 7d</span>
          </div>
        </section>
      </section>
    </template>
  </main>
</body>
</html>
