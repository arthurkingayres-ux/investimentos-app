<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#064e3b">
  <title>Carteira Arthur</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
  <link rel="icon" href="assets/favicon.ico">
  <link rel="stylesheet" href="js/vendor/uplot.min.css?v=19">
  <link rel="stylesheet" href="css/app.css?v=19">
  <script src="js/vendor/uplot.min.js?v=19"></script>
  <script src="js/crypto.js?v=19"></script>
  <script src="js/format.js?v=19"></script>
  <script src="js/app.js?v=19"></script>
  <script defer src="js/vendor/alpine.min.js?v=19"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js").catch((err) => {
          console.warn("SW register falhou:", err);
        });
      });
    }
  </script>
</head>
<body x-data="app" x-cloak>
  <div
    class="toast"
    :class="toast.tom ? ('toast-' + toast.tom) : ''"
    x-show="toast.visible"
    x-transition.opacity
    role="status"
    aria-live="polite"
    x-text="toast.mensagem"></div>
  <main>
    <template x-if="fase === 'pin'">
      <section class="pin-screen" :class="{ 'is-shaking': shake }">
        <h1>Carteira</h1>
        <p class="subtitle" x-show="!estaBloqueado">Digite o PIN para visualizar</p>
        <p class="subtitle pin-block-msg" x-show="estaBloqueado"
           x-text="'Muitas tentativas. Aguarde ' + bloqueioRestanteMin + ' min'"></p>
        <form @submit.prevent="submitPin">
          <input
            type="tel"
            inputmode="numeric"
            pattern="\d{6}"
            maxlength="6"
            autocomplete="off"
            x-model="pin"
            :disabled="carregando || estaBloqueado"
            placeholder="••••••"
            class="pin-input"
            aria-label="PIN de 6 dígitos"
            autofocus>
          <button type="submit"
            :disabled="carregando || estaBloqueado || pin.length !== 6"
            class="pin-submit">
            <span x-show="!carregando && !estaBloqueado">Entrar</span>
            <span x-show="carregando">Decifrando…</span>
            <span x-show="!carregando && estaBloqueado"
              x-text="'Aguarde ' + bloqueioRestanteMin + ' min'"></span>
          </button>
          <p class="pin-error" x-show="pinError && !estaBloqueado" x-text="pinError"></p>
        </form>
      </section>
    </template>

    <template x-if="fase === 'raiox'">
      <div>
      <section class="raiox" x-show="rota === ''" x-cloak>
        <h1>Raio X</h1>

        <section class="hero" aria-label="Patrimônio total">
          <p class="hero-label">Patrimônio total</p>
          <p class="hero-updated" x-text="formatDataHora(json.atualizado_em)"></p>
          <p class="hero-valor" x-text="formatBrl(json.patrimonio.total_brl)"></p>
          <div
            class="hero-delta"
            :class="json.patrimonio.variacao_semanal_brl >= 0 ? 'is-positive' : 'is-negative'"
            x-show="json.patrimonio.variacao_semanal_brl !== null && json.patrimonio.variacao_semanal_brl !== undefined">
            <span class="seta" x-text="json.patrimonio.variacao_semanal_brl >= 0 ? '▲' : '▼'"></span>
            <span x-text="formatBrl(json.patrimonio.variacao_semanal_brl)"></span>
            <span x-text="'(' + formatPct(json.patrimonio.variacao_semanal_pct) + ')'"></span>
            <span class="texto">· 7d</span>
          </div>
        </section>

        <a href="#rentabilidade" class="card rentabilidade card-link" aria-label="Abrir rentabilidade detalhada">
          <h2 class="card-titulo">Rentabilidade <span class="card-arrow">→</span></h2>
          <template x-for="escopo in escoposRentabilidade" :key="escopo.key">
            <div class="rent-escopo">
              <div class="rent-header">
                <span class="bandeira" x-text="escopo.flag"></span>
                <span x-text="escopo.key"></span>
              </div>

              <div class="rent-linha">
                <span class="rent-label">XIRR</span>
                <span
                  class="chip chip-xirr"
                  :class="(escopo.data.xirr_origem ?? 0) < 0 && 'is-neg'"
                  x-text="formatPct(escopo.data.xirr_origem)"></span>
              </div>

              <template x-for="[bkey, bench] in escopo.benchmarks" :key="bkey">
                <div class="rent-benchmark">
                  <span class="bench-label" x-text="'vs ' + (bkey === 'SP500' ? 'S&P 500' : bkey)"></span>
                  <span class="bench-valor">
                    <span x-text="formatPct(bench.xirr_espelhado?.origem)"></span>
                    <span class="sr-only">janela desde a origem</span>
                  </span>
                </div>
              </template>

              <div class="rent-linha">
                <span class="rent-label">TWR</span>
                <span
                  class="chip chip-twr"
                  :class="(escopo.data.twr_origem ?? 0) < 0 && 'is-neg'"
                  x-text="formatPct(escopo.data.twr_origem)"></span>
              </div>
            </div>
          </template>
        </a>

        <a href="#alocacao" class="card alocacao card-link" aria-label="Abrir alocação detalhada">
          <h2 class="card-titulo">Alocação <span class="card-arrow">→</span></h2>
          <template x-for="linha in linhasAlocacao" :key="linha.nome">
            <div class="aloc-linha">
              <div class="aloc-header">
                <span class="aloc-dot" :style="{ background: linha.cor }"></span>
                <span class="aloc-nome" x-text="linha.nome"></span>
                <span class="aloc-valores">
                  <span class="atual" x-text="formatPctSemSinal(linha.pct_atual)"></span>
                  <span class="alvo" x-text="'alvo ' + formatPctSemSinal(linha.pct_alvo)"></span>
                </span>
              </div>
              <div class="aloc-trilha" role="progressbar"
                :aria-valuenow="Math.round(linha.pct_atual * 10000) / 100"
                aria-valuemin="0" aria-valuemax="100">
                <div class="aloc-preenchimento"
                  :style="{ width: Math.min(Math.max(linha.pct_atual, 0) * 100, 100) + '%', background: linha.gradiente }">
                </div>
                <div class="aloc-alvo"
                  x-show="linha.pct_alvo > 0"
                  :style="{ left: Math.min(Math.max(linha.pct_alvo, 0) * 100, 100) + '%' }"
                  :title="'Alvo ' + formatPctSemSinal(linha.pct_alvo)"></div>
              </div>
              <p class="aloc-drift"
                :class="Math.abs(linha.drift) < 0.005 ? '' : (linha.drift > 0 ? 'is-pos' : 'is-neg')"
                x-text="formatPct(linha.drift) + ' vs alvo'"></p>
            </div>
          </template>
        </a>

        <section class="card aporte" aria-label="Último aporte">
          <h2 class="card-titulo">Último aporte</h2>
          <template x-if="json.ultimo_aporte">
            <div>
              <div class="aporte-header">
                <div class="aporte-header-left">
                  <span class="aporte-data" x-text="formatDataCurta(json.ultimo_aporte.data)"></span>
                  <span class="aporte-ha"
                    x-text="json.ultimo_aporte.dias_atras === 0 ? 'hoje' : 'há ' + json.ultimo_aporte.dias_atras + ' dia' + (json.ultimo_aporte.dias_atras === 1 ? '' : 's')">
                  </span>
                </div>
                <span class="aporte-pill" x-text="formatBrl(json.ultimo_aporte.total_brl)"></span>
              </div>
              <template x-for="item in json.ultimo_aporte.itens" :key="item.ticker">
                <a class="aporte-item aporte-item-link" :href="'#ativo/' + item.ticker">
                  <span class="aporte-bandeira" x-text="item.bandeira"></span>
                  <div class="aporte-detalhes">
                    <span class="aporte-ticker" x-text="item.ticker"></span>
                    <span class="aporte-meta"
                      x-text="item.quantidade + ' cota' + (item.quantidade === 1 ? '' : 's') + ' · ' + formatBrl(item.preco_unitario) + ' por unidade'">
                    </span>
                  </div>
                  <span class="aporte-valor" x-text="formatBrl(item.valor_brl)"></span>
                </a>
              </template>
            </div>
          </template>
          <template x-if="!json.ultimo_aporte">
            <p class="aporte-vazio">Nenhum aporte registrado.</p>
          </template>
        </section>

        <a href="#proventos" class="card proventos card-link" aria-label="Abrir proventos detalhados">
          <h2 class="card-titulo">Proventos recebidos <span class="card-arrow">→</span></h2>
          <div class="proventos-linha">
            <span class="proventos-ytd" x-text="formatBrl(json.proventos.ytd_brl)"></span>
            <span class="pill pill-anterior">
              <span x-text="anoAnterior"></span> · <span x-text="formatBrl(json.proventos.ano_anterior_brl)"></span>
            </span>
          </div>
          <p class="proventos-subtexto">Recebidos em <span x-text="anoCorrente"></span></p>
        </a>

        <footer class="rodape">
          <p>Fonte: <code>investimentos.db</code> · doc-trail auditável</p>
          <button @click="bloquear" class="btn-bloquear" type="button">🔒 Bloquear sessão</button>
        </footer>
      </section>

      <section class="tela-detalhes tela-rentabilidade" x-show="rota === 'rentabilidade'" x-cloak>
        <header class="breadcrumb">
          <button aria-label="Voltar" @click="voltar()" type="button">←</button>
          <h1>Rentabilidade</h1>
        </header>

        <div class="escopo-toggle" role="tablist">
          <button
            data-escopo="Total" type="button"
            @click="selecionarEscopo('Total')"
            :class="{ active: escopoAtivo === 'Total' }">Total</button>
          <button
            data-escopo="Brasil" type="button"
            @click="selecionarEscopo('Brasil')"
            :class="{ active: escopoAtivo === 'Brasil' }">🇧🇷 Brasil</button>
          <button
            data-escopo="EUA" type="button"
            @click="selecionarEscopo('EUA')"
            :class="{ active: escopoAtivo === 'EUA' }">🇺🇸 EUA</button>
        </div>

        <div id="chart-rent" class="chart-rent" aria-label="Histórico TWR"></div>

        <div class="rent-grupos">
          <section class="rent-grupo">
            <h3 class="rent-grupo-titulo">Origem</h3>
            <div class="rent-metrica">
              <span class="rent-metrica-label">XIRR a.a.</span>
              <span class="rent-metrica-valor"
                    x-text="formatPct(json?.rentabilidade?.[escopoAtivo]?.xirr_origem)"></span>
            </div>
            <div class="rent-metrica">
              <span class="rent-metrica-label">TWR a.a.</span>
              <span class="rent-metrica-valor"
                    x-text="formatPct(json?.rentabilidade?.[escopoAtivo]?.twr_origem)"></span>
            </div>
            <template x-for="[bkey, bench] in Object.entries(json?.rentabilidade?.[escopoAtivo]?.benchmarks || {})" :key="bkey">
              <div class="rent-benchmark">
                <span class="bench-label" x-text="'vs ' + (bkey === 'SP500' ? 'S&P 500' : bkey)"></span>
                <span class="bench-valor">
                  <span x-text="formatPct(bench.xirr_espelhado?.origem)"></span>
                  <span class="bench-twr" x-text="' · TWR ' + formatPct(bench.twr_espelhado?.origem)"></span>
                </span>
              </div>
            </template>
          </section>
          <section class="rent-grupo">
            <h3 class="rent-grupo-titulo">Ano (YTD)</h3>
            <div class="rent-metrica">
              <span class="rent-metrica-label">XIRR a.a.</span>
              <span class="rent-metrica-valor"
                    x-text="formatPct(json?.rentabilidade?.[escopoAtivo]?.xirr_ytd)"></span>
            </div>
            <div class="rent-metrica">
              <span class="rent-metrica-label">TWR a.a.</span>
              <span class="rent-metrica-valor"
                    x-text="formatPct(json?.rentabilidade?.[escopoAtivo]?.twr_ytd)"></span>
            </div>
            <template x-for="[bkey, bench] in Object.entries(json?.rentabilidade?.[escopoAtivo]?.benchmarks || {})" :key="bkey">
              <div class="rent-benchmark">
                <span class="bench-label" x-text="'vs ' + (bkey === 'SP500' ? 'S&P 500' : bkey)"></span>
                <span class="bench-valor">
                  <span x-text="formatPct(bench.xirr_espelhado?.ytd)"></span>
                  <span class="bench-twr" x-text="' · TWR ' + formatPct(bench.twr_espelhado?.ytd)"></span>
                </span>
              </div>
            </template>
          </section>
          <section class="rent-grupo">
            <h3 class="rent-grupo-titulo">12 meses</h3>
            <div class="rent-metrica">
              <span class="rent-metrica-label">XIRR a.a.</span>
              <span class="rent-metrica-valor"
                    x-text="formatPct(json?.rentabilidade?.[escopoAtivo]?.xirr_12m)"></span>
            </div>
            <div class="rent-metrica">
              <span class="rent-metrica-label">TWR a.a.</span>
              <span class="rent-metrica-valor"
                    x-text="formatPct(json?.rentabilidade?.[escopoAtivo]?.twr_12m)"></span>
            </div>
            <template x-for="[bkey, bench] in Object.entries(json?.rentabilidade?.[escopoAtivo]?.benchmarks || {})" :key="bkey">
              <div class="rent-benchmark">
                <span class="bench-label" x-text="'vs ' + (bkey === 'SP500' ? 'S&P 500' : bkey)"></span>
                <span class="bench-valor">
                  <span x-text="formatPct(bench.xirr_espelhado?.['12m'])"></span>
                  <span class="bench-twr" x-text="' · TWR ' + formatPct(bench.twr_espelhado?.['12m'])"></span>
                </span>
              </div>
            </template>
          </section>
        </div>

        <aside class="rent-legenda" aria-labelledby="rent-legenda-titulo">
          <h4 id="rent-legenda-titulo">Como ler</h4>
          <p><strong>XIRR</strong> — retorno anualizado considerando quando você aportou. Capta o efeito do timing dos aportes.</p>
          <p><strong>TWR</strong> — retorno anualizado ignorando seus aportes. Mede só a qualidade da seleção e gestão.</p>
        </aside>

        <p
          class="interpretacao"
          x-show="json?.rentabilidade?.interpretacao?.[escopoAtivo]"
          x-text="json?.rentabilidade?.interpretacao?.[escopoAtivo]"></p>
      </section>

      <section class="tela-detalhes tela-alocacao" x-show="rota === 'alocacao'" x-cloak>
        <header class="breadcrumb">
          <button aria-label="Voltar" @click="voltar()" type="button">←</button>
          <h1>Alocação</h1>
        </header>

        <div class="alocacao-card">
          <template x-for="classe in ['EUA', 'FIIs', 'Ações BR', 'Cripto']" :key="classe">
            <div class="classe-bloco">
              <div
                class="classe-row"
                :data-classe="classe"
                @click="expandirClasse(classe)"
                role="button"
                tabindex="0"
                @keydown.enter.prevent="expandirClasse(classe)"
                @keydown.space.prevent="expandirClasse(classe)">
                <span class="classe-dot" :class="'dot-' + classe.toLowerCase().replace(/\s+/g, '-').replace(/ç/g, 'c').replace(/õ/g, 'o').replace(/é/g, 'e')"></span>
                <span class="classe-nome" x-text="classe"></span>
                <span class="classe-pct">
                  <span x-text="formatPctSemSinal(pctAtualClasse(classe))"></span>
                  <span class="alvo-pct">alvo <span x-text="formatPctSemSinal(pctAlvoClasse(classe))"></span></span>
                </span>
                <span class="classe-arrow" x-text="classeExpandida === classe ? '▾' : '▸'"></span>
              </div>
              <div
                class="classe-tickers"
                :data-classe="classe"
                x-show="classeExpandida === classe"
                x-cloak>
                <template x-for="p in tickersComPesos(classe)" :key="p.ticker">
                  <a :href="'#ativo/' + p.ticker" class="ticker-row">
                    <span class="ticker-name" x-text="p.ticker"></span>
                    <span class="ticker-vm" x-text="formatBrl(p.valor_mercado_brl)"></span>
                    <span class="ticker-pct" x-text="formatPctSemSinal(p.peso_na_classe)"></span>
                  </a>
                </template>
                <p class="ticker-empty" x-show="tickersComPesos(classe).length === 0">
                  Nenhum ativo nesta classe.
                </p>
              </div>
            </div>
          </template>
        </div>
      </section>

      <section class="tela-detalhes tela-ativo" x-show="rota === 'ativo'" x-cloak>
        <header class="breadcrumb">
          <button aria-label="Voltar" @click="voltar()" type="button">←</button>
          <h1 x-text="tickerAtual"></h1>
        </header>

        <template x-if="!posicaoAtual">
          <div class="erro-nao-encontrado">
            <p>Ativo <strong x-text="tickerAtual"></strong> não encontrado na carteira.</p>
            <a href="#alocacao">← Voltar para Alocação</a>
          </div>
        </template>

        <template x-if="posicaoAtual">
          <div class="ativo-corpo">
            <div class="ticker-hero">
              <h2>
                <span class="ticker-bandeira" x-text="bandeiraDaPosicao(posicaoAtual)"></span>
                <span x-text="posicaoAtual.ticker"></span>
              </h2>
              <p class="ticker-classe" x-text="posicaoAtual.classe"></p>
              <p class="ticker-vm-grande" x-text="formatBrl(posicaoAtual.valor_mercado_brl)"></p>
            </div>

            <div class="kpi-grid">
              <div class="kpi">
                <span class="kpi-label">Quantidade</span>
                <span class="kpi-valor" x-text="posicaoAtual.quantidade"></span>
              </div>
              <div class="kpi">
                <span class="kpi-label">Custo médio</span>
                <span class="kpi-valor" x-text="formatBrl(posicaoAtual.custo_medio)"></span>
              </div>
              <div class="kpi">
                <span class="kpi-label">Último preço</span>
                <span class="kpi-valor" x-text="formatBrl(posicaoAtual.ultimo_preco)"></span>
              </div>
              <div class="kpi">
                <span class="kpi-label">Ganho / perda</span>
                <span
                  class="kpi-valor"
                  :class="(posicaoAtual.ganho_perda_brl ?? 0) < 0 && 'is-neg'"
                  x-text="formatBrl(posicaoAtual.ganho_perda_brl)"></span>
              </div>
              <div class="kpi">
                <span class="kpi-label">Ganho %</span>
                <span
                  class="kpi-valor"
                  :class="(posicaoAtual.ganho_perda_pct ?? 0) < 0 && 'is-neg'"
                  x-text="formatPct(posicaoAtual.ganho_perda_pct)"></span>
              </div>
              <div class="kpi">
                <span class="kpi-label">XIRR</span>
                <span class="kpi-valor" x-text="formatPct(posicaoAtual.xirr_aa)"></span>
              </div>
            </div>

            <h3 class="ativo-section-h">Movimentos · últimos 12 meses</h3>
            <template x-if="(posicaoAtual.movimentos || []).length === 0">
              <p class="vazio">Nenhum movimento registrado.</p>
            </template>
            <template x-if="(posicaoAtual.movimentos || []).length > 0">
              <div class="tabela-wrap">
                <table class="tabela-movimentos">
                  <thead>
                    <tr><th>Data</th><th>Lado</th><th>Qty</th><th>Preço</th><th>Total</th></tr>
                  </thead>
                  <tbody>
                    <template
                      x-for="(m, idx) in posicaoAtual.movimentos"
                      :key="m.data + '-' + m.lado + '-' + idx">
                      <tr>
                        <td x-text="m.data"></td>
                        <td>
                          <span
                            class="lado-pill"
                            :class="formatarLado(m.lado).classe"
                            :title="m.lado"
                            x-text="formatarLado(m.lado).texto"></span>
                        </td>
                        <td class="num" x-text="m.quantidade"></td>
                        <td class="num" x-text="formatBrl(m.preco_unitario)"></td>
                        <td class="num" x-text="formatBrl(m.total_brl)"></td>
                      </tr>
                    </template>
                  </tbody>
                </table>
              </div>
            </template>

            <h3 class="ativo-section-h">Proventos · últimos 12 meses</h3>
            <template x-if="(posicaoAtual.proventos || []).length === 0">
              <p class="vazio">Nenhum provento registrado.</p>
            </template>
            <template x-if="(posicaoAtual.proventos || []).length > 0">
              <div class="tabela-wrap">
                <table class="tabela-proventos">
                  <thead>
                    <tr><th>Data</th><th>Valor</th><th>Tipo</th></tr>
                  </thead>
                  <tbody>
                    <template
                      x-for="(pr, idx) in posicaoAtual.proventos"
                      :key="pr.data_pagamento + '-' + idx">
                      <tr>
                        <td x-text="pr.data_pagamento"></td>
                        <td class="num" x-text="formatBrl(pr.valor_liquido_brl)"></td>
                        <td x-text="pr.tipo"></td>
                      </tr>
                    </template>
                  </tbody>
                </table>
              </div>
            </template>
          </div>
        </template>
      </section>

      <!-- ── Tela #proventos ──────────────────────────────────────────── -->
      <section class="tela-detalhes tela-proventos" x-show="rota === 'proventos'" x-cloak>
        <header class="breadcrumb">
          <button aria-label="Voltar" @click="voltar()" type="button">←</button>
          <h1>Proventos</h1>
        </header>

        <div class="kpi-grid kpi-grid-3">
          <div class="kpi">
            <span class="kpi-label">YTD <span x-text="anoCorrente"></span></span>
            <span class="kpi-valor" x-text="formatBrl(json?.proventos?.ytd_brl)"></span>
          </div>
          <div class="kpi">
            <span class="kpi-label"><span x-text="anoAnterior"></span></span>
            <span class="kpi-valor" x-text="formatBrl(json?.proventos?.ano_anterior_brl)"></span>
          </div>
          <div class="kpi">
            <span class="kpi-label">Total Origem</span>
            <span class="kpi-valor" x-text="formatBrl(totalProventosOrigem)"></span>
          </div>
        </div>

        <div class="escopo-toggle" role="tablist" aria-label="Período">
          <button
            type="button"
            role="tab"
            :aria-selected="proventosToggle === 'anual'"
            :class="{ active: proventosToggle === 'anual' }"
            @click="setProventosToggle('anual')">Anual</button>
          <button
            type="button"
            role="tab"
            :aria-selected="proventosToggle === 'mensal'"
            :class="{ active: proventosToggle === 'mensal' }"
            @click="setProventosToggle('mensal')">Mensal (12m)</button>
        </div>

        <div id="proventos-grafico" class="chart-rent" aria-label="Evolução de proventos"></div>

        <h3 class="ativo-section-h">Por ativo</h3>
        <template x-if="tabelaProventosAtual().length === 0">
          <p class="vazio">Nenhum dado disponível.</p>
        </template>
        <template x-if="tabelaProventosAtual().length > 0">
          <div class="tabela-wrap">
            <table class="tabela-proventos" aria-label="Proventos por ativo">
              <thead>
                <tr>
                  <th>Ticker</th>
                  <th class="num">Total</th>
                </tr>
              </thead>
              <tbody>
                <template x-for="item in tabelaProventosAtual()" :key="item.ticker">
                  <tr
                    class="row-link"
                    tabindex="0"
                    role="link"
                    :aria-label="'Ver ativo ' + item.ticker"
                    @click="location.hash = 'ativo/' + item.ticker"
                    @keydown.enter="location.hash = 'ativo/' + item.ticker"
                    @keydown.space.prevent="location.hash = 'ativo/' + item.ticker">
                    <td x-text="item.ticker"></td>
                    <td class="num" x-text="formatBrl(item.total)"></td>
                  </tr>
                </template>
              </tbody>
            </table>
          </div>
        </template>
      </section>

      </div>
    </template>
  </main>
</body>
</html>
